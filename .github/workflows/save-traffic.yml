name: Save Traffic Data

on:
  schedule:
    # 毎日 JST 9:00（UTC 0:00）に実行
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  save:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch counter from CountAPI and save
        run: |
          DATE=$(date -u +%Y-%m-%d)
          mkdir -p traffic-log

          # CountAPI からスキャン数を取得（認証不要）
          COUNT_JSON=$(curl -sf "https://api.countapi.xyz/get/shinonft-fax-track/qr-scan" || echo '{"value":0}')
          TOTAL=$(echo "$COUNT_JSON" | python3 -c "import json,sys; print(json.load(sys.stdin).get('value', 0))" 2>/dev/null || echo 0)

          # 日次スナップショットを保存
          echo "{\"date\":\"${DATE}\",\"total\":${TOTAL}}" > traffic-log/snapshot_${DATE}.json

          echo "Total scans: ${TOTAL}"

      - name: Update cumulative summary
        run: |
          python3 - <<'PYEOF'
import json, glob
from datetime import datetime, timezone

snapshots = []
for f in sorted(glob.glob("traffic-log/snapshot_*.json")):
    try:
        snapshots.append(json.load(open(f)))
    except Exception:
        pass

# 最新のスナップショットから差分で日次カウントを算出
by_date = {}
prev = 0
for s in snapshots:
    daily = max(0, s["total"] - prev)
    by_date[s["date"]] = {"count": daily, "cumulative": s["total"]}
    prev = s["total"]

total = snapshots[-1]["total"] if snapshots else 0

summary = {
    "updated_at": datetime.now(timezone.utc).isoformat(),
    "total_views": total,
    "by_date": by_date
}

with open("traffic-log/summary.json", "w") as f:
    json.dump(summary, f, indent=2, ensure_ascii=False)

print(f"Total scans: {total}")
PYEOF

      - name: Commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add traffic-log/
          git diff --cached --quiet || git commit -m "chore: save scan count $(date -u +%Y-%m-%d)"
          git push
