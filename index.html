<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>資料を開いています...</title>

  <!-- ================================================
    Google Analytics 4
    GA_MEASUREMENT_ID を実際のIDに置き換えてください
    例: G-ABC1234567
  ================================================ -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=GA_MEASUREMENT_ID"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){ dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', 'GA_MEASUREMENT_ID', {
      // UTMパラメータ（GA4ダッシュボードで参照元として表示）
      campaign_source:  'fax',
      campaign_medium:  'print',
      campaign_name:    'kasuhara_care_2026'
    });

    // ── 転送先 ──────────────────────────────────────
    var DESTINATION = 'https://drive.google.com/file/d/1XqWlM22L6jy3fP1RFGj6BW-JszB6yBvL/view?usp=drive_link';

    // カスタムイベント送信 → 完了後に転送
    gtag('event', 'qr_scan', {
      event_category: 'fax_campaign',
      event_label:    'kasuhara_care_fax',
      // GA4 が送信完了したら転送する
      event_callback: function() {
        window.location.href = DESTINATION;
      },
      // GA4 が遅い場合も最大1秒後に転送
      event_timeout: 1000
    });

    // フォールバック: スクリプトエラーでも必ず転送
    setTimeout(function() {
      window.location.href = DESTINATION;
    }, 1500);
  </script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Hiragino Sans', 'Meiryo', sans-serif;
      background: #f0f4f8;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: white;
      border-radius: 12px;
      padding: 40px 32px;
      text-align: center;
      max-width: 360px;
      width: 90%;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }
    .spinner {
      width: 48px; height: 48px;
      border: 4px solid #e2e8f0;
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 24px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    h1 { font-size: 18px; color: #1e293b; margin-bottom: 8px; }
    p  { font-size: 14px; color: #64748b; line-height: 1.6; }
    .badge {
      display: inline-block;
      margin-top: 20px;
      padding: 4px 12px;
      background: #dbeafe;
      color: #1d4ed8;
      border-radius: 99px;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="spinner"></div>
    <h1>資料を準備しています</h1>
    <p>まもなく自動的に<br>資料ページへ移動します</p>
    <span class="badge">カスタマーハラスメント対策</span>
  </div>
</body>
</html>
